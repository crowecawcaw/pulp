# zizmor configuration — https://docs.zizmor.sh/configuration/
#
# Policy: tag-pinned actions (e.g. actions/checkout@v4) are acceptable, so
# `unpinned-uses` only fires on branch/unpinned refs rather than demanding a
# full commit SHA for every action. The CI gate fails on any *high* finding
# (see .github/workflows/ci.yml), so the genuinely dangerous audits
# (template-injection, excessive-permissions, cache-poisoning, ...) stay hard
# blockers.
rules:
  unpinned-uses:
    config:
      policies:
        "*": ref-pin

  # release.yml is autogenerated by cargo-dist ("do not edit" — regenerated by
  # `dist init`), so these are cargo-dist's own vetted patterns rather than
  # something we author. Tag pushes (the only non-PR trigger) are
  # maintainer-only. Documented as accepted risk instead of hand-editing a
  # generated file that would just be overwritten.
  excessive-permissions:
    ignore:
      - release.yml
  template-injection:
    ignore:
      - release.yml
  unpinned-images:
    ignore:
      - release.yml
  # Low-confidence heuristic: zizmor flags actions/setup-node in any workflow
  # that publishes artifacts, even though we've disabled its cache (see the
  # setup-node steps). release.yml is generated; the two app workflows are
  # maintainer-triggered only (workflow_dispatch / tag push). Accepted risk.
  cache-poisoning:
    ignore:
      - release.yml
      - release-macos-app.yml
      - release-windows-app.yml
